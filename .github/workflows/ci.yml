name: Build and Release Component

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux
            name: Linux (x86, shared Bullet)
            os: ubuntu-24.04
            bullet_shared_libs: "ON"
            expected_component: ColAndreas.so
            release_glob: dist/ColAndreas-linux.tar.gz
            release_archive: ColAndreas-linux.tar.gz
          - id: linux-static
            name: Linux (x86, static Bullet)
            os: ubuntu-24.04
            bullet_shared_libs: "OFF"
            expected_component: ColAndreas_static.so
            release_glob: dist/ColAndreas-linux-static.tar.gz
            release_archive: ColAndreas-linux-static.tar.gz
          - id: windows
            name: Windows (Win32)
            os: windows-2022
            expected_component: ColAndreas.dll
            release_glob: dist/ColAndreas-windows.zip
            release_archive: ColAndreas-windows.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-multilib git

      - name: Build Bullet for Linux x86
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/bulletphysics/bullet3 deps/bullet3

          cmake -S deps/bullet3 -B deps/bullet3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/deps/bullet3-install" \
            -DCMAKE_C_FLAGS="-m32" \
            -DCMAKE_CXX_FLAGS="-m32" \
            -DCMAKE_SHARED_LINKER_FLAGS="-m32" \
            -DBUILD_SHARED_LIBS="${{ matrix.bullet_shared_libs }}" \
            -DINSTALL_LIBS=ON \
            -DBUILD_BULLET2_DEMOS=OFF \
            -DBUILD_CPU_DEMOS=OFF \
            -DBUILD_EXTRAS=OFF \
            -DBUILD_OPENGL3_DEMOS=OFF \
            -DBUILD_UNIT_TESTS=OFF
          cmake --build deps/bullet3-build --target install --parallel

          bullet_config_dir="$(find "${GITHUB_WORKSPACE}/deps/bullet3-install" -type f -name BulletConfig.cmake -printf '%h\n' | head -n 1)"
          if [[ -z "${bullet_config_dir}" ]]; then
            echo "Could not locate BulletConfig.cmake in deps/bullet3-install"
            exit 1
          fi
          echo "BULLET_CONFIG_DIR=${bullet_config_dir}" >> "${GITHUB_ENV}"

          if [[ "${{ matrix.bullet_shared_libs }}" == "ON" ]]; then
            bullet_collision_so="$(find "${GITHUB_WORKSPACE}/deps/bullet3-install" -type f -name 'libBulletCollision.so*' | head -n 1)"
            if [[ -z "${bullet_collision_so}" ]]; then
              echo "Could not locate libBulletCollision shared library in deps/bullet3-install"
              exit 1
            fi
            file "${bullet_collision_so}" | grep -q 'ELF 32-bit'
          else
            bullet_collision_a="$(find "${GITHUB_WORKSPACE}/deps/bullet3-install" -type f -name 'libBulletCollision.a' | head -n 1)"
            if [[ -z "${bullet_collision_a}" ]]; then
              echo "Could not locate libBulletCollision static library in deps/bullet3-install"
              exit 1
            fi
          fi

      - name: Install Bullet for Windows (x86 static)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VcpkgRoot = "$env:RUNNER_TEMP\vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg $VcpkgRoot
          & "$VcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          & "$VcpkgRoot\vcpkg.exe" install bullet3:x86-windows-static

          $TripletRoot = "$VcpkgRoot\installed\x86-windows-static"
          if (!(Test-Path "$TripletRoot\include\bullet\btBulletDynamicsCommon.h")) { throw "Missing Bullet headers in $TripletRoot" }
          if (!(Test-Path "$TripletRoot\lib\BulletCollision.lib")) { throw "Missing Bullet import/static lib in $TripletRoot\lib" }

          $Toolchain = "$VcpkgRoot\scripts\buildsystems\vcpkg.cmake" -replace '\\','/'
          $TripletRoot = $TripletRoot -replace '\\','/'
          "VCPKG_TOOLCHAIN_FILE=$Toolchain" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_INSTALLED_DIR=$TripletRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DFORCE_32_BIT=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/deps/bullet3-install" \
            -DBullet_DIR="${BULLET_CONFIG_DIR}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A Win32 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN_FILE" `
            -DVCPKG_TARGET_TRIPLET=x86-windows-static `
            -DBULLET_ROOT="$env:VCPKG_INSTALLED_DIR" `
            -DCMAKE_PREFIX_PATH="$env:VCPKG_INSTALLED_DIR"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Verify exposed natives
        if: runner.os == 'Linux'
        run: bash scripts/ci/check-native-exposure.sh

      - name: Locate Linux component and verify x86 binary
        if: runner.os == 'Linux'
        id: locate_linux_component
        shell: bash
        run: |
          set -euo pipefail
          expected_component="${{ matrix.expected_component }}"
          component_path="$(find build -maxdepth 2 -type f -name "${expected_component}" | head -n 1)"
          if [[ -z "${component_path}" ]]; then
            echo "Could not find expected component (${expected_component}) in build output."
            exit 1
          fi
          if ! file "${component_path}" | grep -q 'ELF 32-bit'; then
            echo "Expected a 32-bit ELF binary, got:"
            file "${component_path}"
            exit 1
          fi
          echo "component_path=${component_path}" >> "${GITHUB_OUTPUT}"

      - name: Locate Windows component and verify x86 binary
        if: runner.os == 'Windows'
        id: locate_windows_component
        shell: pwsh
        run: |
          $component = Get-ChildItem -Path build -Recurse -Filter ColAndreas.dll | Select-Object -First 1
          if (-not $component) { throw "Could not find ColAndreas.dll in build output." }

          $bytes = [System.IO.File]::ReadAllBytes($component.FullName)
          if ($bytes.Length -lt 64 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) { throw "Invalid DOS header in $($component.FullName)" }
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          if ($peOffset + 24 -ge $bytes.Length) { throw "Invalid PE offset in $($component.FullName)" }
          if ($bytes[$peOffset] -ne 0x50 -or $bytes[$peOffset + 1] -ne 0x45) { throw "Invalid PE signature in $($component.FullName)" }

          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          $magic = [BitConverter]::ToUInt16($bytes, $peOffset + 24)
          if ($machine -ne 0x14C) { throw ("Expected x86 machine type 0x14C, got 0x{0:X}" -f $machine) }
          if ($magic -ne 0x10B) { throw ("Expected PE32 optional header 0x10B, got 0x{0:X}" -f $magic) }

          $componentPath = $component.FullName -replace '\\','/'
          "component_path=$componentPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stage Linux build artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          component_output_dir="dist/${{ matrix.id }}/components"
          component_path="${{ steps.locate_linux_component.outputs.component_path }}"

          mkdir -p "${component_output_dir}" "dist/${{ matrix.id }}/pawno/include"
          cp "${component_path}" "${component_output_dir}/"
          cp Server/include/colandreas.inc "dist/${{ matrix.id }}/pawno/include/colandreas.inc"

          if [[ "${{ matrix.bullet_shared_libs }}" == "ON" ]]; then
            mapfile -t bullet_lib_paths < <(
              ldd "${component_path}" \
                | awk '/=>/ { print $3 }' \
                | grep -E '/lib(Bullet|LinearMath).*\.so' \
                | sort -u
            )

            if [[ "${#bullet_lib_paths[@]}" -eq 0 ]]; then
              echo "Could not resolve Bullet shared library dependencies via ldd."
              ldd "${component_path}" || true
              exit 1
            fi

            for lib_path in "${bullet_lib_paths[@]}"; do
              if [[ ! -f "${lib_path}" ]]; then
                echo "Resolved Bullet shared library does not exist: ${lib_path}"
                exit 1
              fi
              cp "${lib_path}" "${component_output_dir}/"
            done
          fi

      - name: Stage Windows build artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows/components | Out-Null
          New-Item -ItemType Directory -Force -Path dist/windows/pawno/include | Out-Null
          Copy-Item "${{ steps.locate_windows_component.outputs.component_path }}" "dist/windows/components/ColAndreas.dll"
          Copy-Item "Server/include/colandreas.inc" "dist/windows/pawno/include/colandreas.inc"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.id }}
          path: |
            dist/${{ matrix.id }}/components/*
            dist/${{ matrix.id }}/pawno/include/colandreas.inc
          if-no-files-found: error

      - name: Package Linux release archive
        if: github.event_name == 'release' && runner.os == 'Linux'
        run: |
          rm -rf release/ColAndreas
          mkdir -p release/ColAndreas
          cp -r dist/${{ matrix.id }}/components release/ColAndreas/components
          cp -r dist/${{ matrix.id }}/pawno release/ColAndreas/pawno
          tar -C release -czf "dist/${{ matrix.release_archive }}" ColAndreas

      - name: Verify Linux package contents
        if: github.event_name == 'release' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          package_path="dist/${{ matrix.release_archive }}"
          tar -tzf "${package_path}" | grep -Fx "ColAndreas/components/${{ matrix.expected_component }}"
          tar -tzf "${package_path}" | grep -Fx 'ColAndreas/pawno/include/colandreas.inc'

          if [[ "${{ matrix.bullet_shared_libs }}" == "ON" ]]; then
            tar -tzf "${package_path}" | grep -E '^ColAndreas/components/libBulletCollision\.so(\..+)?$'
            tar -tzf "${package_path}" | grep -E '^ColAndreas/components/libBulletDynamics\.so(\..+)?$'
            tar -tzf "${package_path}" | grep -E '^ColAndreas/components/libLinearMath\.so(\..+)?$'
          fi

      - name: Package Windows release archive
        if: github.event_name == 'release' && runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Remove-Item -Recurse -Force "release/ColAndreas" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "dist/windows" "release/ColAndreas"
          Compress-Archive -Path "release/ColAndreas" -DestinationPath "dist/ColAndreas-windows.zip" -Force

      - name: Verify Windows package contents
        if: github.event_name == 'release' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "dist/ColAndreas-windows.zip"
          if (!(Test-Path $pkg)) { throw "No ZIP package found: $pkg" }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($pkg)
          try {
            $entries = $zip.Entries | ForEach-Object { $_.FullName }
            if (-not ($entries | Where-Object { $_ -eq "ColAndreas/components/ColAndreas.dll" })) {
              throw "Missing ColAndreas/components/ColAndreas.dll in package"
            }
            if (-not ($entries | Where-Object { $_ -eq "ColAndreas/pawno/include/colandreas.inc" })) {
              throw "Missing ColAndreas/pawno/include/colandreas.inc in package"
            }
          } finally {
            $zip.Dispose()
          }

      - name: Upload release package artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.id }}
          path: ${{ matrix.release_glob }}
          if-no-files-found: error

  upload-release-assets:
    name: Upload release assets
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
